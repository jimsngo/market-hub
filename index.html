<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgical Hub | Tactical Command</title>
    <style>
        :root { 
            --bg: #0b0f19; 
            --card-bg: #161b2c; 
            --text: #f1f5f9; 
            --text-dim: #64748b; 
            --accent: #3b82f6; 
            --bullish: #4ade80; 
            --bearish: #f87171; 
            --caution: #fbbf24; 
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
        }

        .container { max-width: 1200px; width: 100%; }

        /* HEADER & CONTROLS */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            padding-bottom: 10px;
        }
        .header h1 { margin: 0; font-weight: 900; font-size: 1.5rem; letter-spacing: -0.02em; }
        .sync-box { text-align: right; display: flex; align-items: center; gap: 10px; }
        #timestamp { color: var(--text-dim); font-size: 0.7rem; font-family: monospace; }

        button { 
            padding: 10px 18px; 
            background: var(--accent); 
            border: none; 
            color: white; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 0.75rem;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        button:hover { filter: brightness(1.2); }
        button:disabled { background: #475569; cursor: not-allowed; }
        .btn-intel { background: #1e293b; border: 1px solid #334155; }

        /* SECTIONS */
        .section-header { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            color: var(--accent); 
            margin: 25px 0 12px; 
            border-bottom: 1px solid #2d3748; 
            padding-bottom: 8px; 
            font-weight: 800; 
        }

        /* GRID & CELLS */
        .data-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); 
            gap: 12px; 
            margin-bottom: 25px; 
        }
        .cell { 
            background: var(--card-bg); 
            padding: 16px; 
            border-radius: 10px; 
            border: 1px solid #2d3748; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .cell:hover { border-color: var(--accent); }
        .cell.active { border-color: var(--accent); border-width: 2px; background: #1e253a; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .val { font-size: 1.4rem; font-weight: 900; margin: 4px 0; }
        .sub { font-size: 0.7rem; color: var(--text-dim); line-height: 1.6; text-align: left; border-top: 1px solid #2d3748; margin-top: 8px; padding-top: 8px; }

        /* ANALYSIS & NEWS */
        .dashboard-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #2d3748; }
        
        .big-stat { font-size: 3rem; font-weight: 900; line-height: 1; margin: 10px 0; }
        #news-tape { max-height: 250px; overflow-y: auto; font-size: 0.85rem; }
        .news-item { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #2d3748; }
        .news-item a { color: var(--text); text-decoration: none; font-weight: 500; }
        .news-item a:hover { color: var(--accent); }

        @media (max-width: 768px) { .dashboard-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Surgical <span style="color:var(--accent)">Hub</span></h1>
        <div class="sync-box">
            <span id="timestamp">LAST SYNC: --:--</span>
            <button id="intel-btn" class="btn-intel" onclick="triggerNews()">Intel Only</button>
            <button id="sync-btn" onclick="triggerSync()">Refresh Theatre</button>
        </div>
    </div>

    <div class="section-header">Market Matrix</div>
    <div id="data-grid" class="data-grid"></div>

    <div class="dashboard-row">
        <div>
            <div class="section-header">Interrogation (<span id="active-ticker">--</span>)</div>
            <div class="box" style="display: flex; gap: 25px; align-items: center;">
                <div id="analysis-narrative" style="flex: 1; line-height: 1.8;">Select an index to begin.</div>
                <div style="text-align: center; border-left: 1px solid #2d3748; padding-left: 25px;">
                    <div style="font-size: 0.65rem; color: var(--accent); font-weight: 800;">VALUE GAP</div>
                    <div id="big-stat-val" class="big-stat">--</div>
                    <div id="breadth-val" style="font-size: 0.7rem; font-weight: 700;">PTCP: --</div>
                </div>
            </div>
        </div>
        <div>
            <div class="section-header">Live Intel Feed</div>
            <div id="news-tape" class="box">Awaiting macro pulse...</div>
        </div>
    </div>
</div>

<script type="module">
    import { loadConstants } from './js/config.js';
    import { fetchMarketData, fetchNews } from './js/engine.js';
    import { renderAll, selectTicker } from './js/ui.js';

    window.selectTicker = (s) => selectTicker(s);
    let lastRequestTime = 0;

    window.triggerSync = async () => {
        const now = Date.now();
        if (now - lastRequestTime < 30000) return;
        const btn = document.getElementById('sync-btn');
        btn.innerText = "SYNCING..."; btn.disabled = true;
        try {
            const symbols = ["SPY", "DIA", "QQQ", "IWM", "VXX", "%5ETNX"];
            const data = await fetchMarketData(symbols);
            lastRequestTime = Date.now();
            localStorage.setItem('surgicalData', JSON.stringify(data));
            renderAll(data);
        } catch (e) { console.error(e); }
        btn.innerText = "Refresh Theatre"; btn.disabled = false;
    };

    window.onload = async () => {
        await loadConstants();
        const cached = localStorage.getItem('surgicalData');
        if (cached) renderAll(JSON.parse(cached));
    };
</script>

</body>
</html>
