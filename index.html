<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surgical Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="theatre-container">
        <header>
            <div class="header-left">
                <h1>SURGICAL HUB</h1>
                <div id="clock">00:00:00</div>
            </div>
            <div class="header-right">
                <div id="timestamp">Awaiting Sync...</div>
                <button id="sync-btn">Refresh Theatre</button>
            </div>
        </header>

        <div id="data-grid" class="grid"></div>

        <div class="dashboard-row">
            <div class="section-header">Live Intel Feed</div>
            <div id="news-tape" class="box" style="padding: 15px; min-height: 50px;"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/marketEngine.js"></script>
    <script src="js/ui.js"></script>
    
    <script>
        async function triggerSync() {
            console.log("%c--- Sync Sequence Initiated ---", "color: white; background: #3b82f6; padding: 2px 5px;");
            const btn = document.getElementById('sync-btn');
            btn.innerText = "SYNCING...";
            btn.disabled = true;
            try {
                const symbols = ["SPY", "DIA", "QQQ", "IWM", "VXX", "%5ETNX"];
                const data = await fetchMarketData(symbols);
                data.news = await fetchNews();
                
                console.log("Sync complete. Saving to Cache.");
                localStorage.setItem('surgicalData', JSON.stringify(data));
                renderDashboard(data);
            } catch (e) {
                console.error("%c[CRITICAL ERROR]", "color: red; font-weight: bold;", e);
            }
            btn.innerText = "Refresh Theatre";
            btn.disabled = false;
        }

        window.onload = () => {
            console.log("System Online. Ready.");
            setInterval(updateClock, 1000);
            
            const saved = localStorage.getItem('surgicalData');
            if (saved) {
                console.log("Displaying cached data while refreshing intel...");
                renderDashboard(JSON.parse(saved));
            }
            
            // AUTO-SYNC: Force a fresh fetch 1 second after load to see new logs
            setTimeout(triggerSync, 1000);

            document.getElementById('sync-btn').onclick = triggerSync;
        };
    </script>
</body>
</html>
